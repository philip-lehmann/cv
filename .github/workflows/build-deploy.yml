# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.ref }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-deploy:
    # runs-on: self-hosted
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('bun.lock') }}-node-modules
      - name: install dependencies
        run: |
          bun install

      - name: setup nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Nx affected checks
        run: bun x nx affected -t lint,typecheck --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}
      - name: Nx affected build
        if: github.ref == 'refs/heads/main'
        run: bun x nx affected -t build --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}

      - name: Check app build output
        if: github.ref == 'refs/heads/main'
        id: app-build
        run: |
          if [ -d "dist/apps/cv" ] || [ -d "dist/cv" ] || [ -d "dist" ]; then
            echo "built=true" >> $GITHUB_OUTPUT
          else
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set version
        if: github.ref == 'refs/heads/main'
        run: echo "TAG_VERSION=$(date +'%y-%m-%d').$GITHUB_RUN_NUMBER" >> $GITHUB_ENV

      - name: Build and push
        if: github.ref == 'refs/heads/main' && steps.app-build.outputs.built == 'true'
        run: |
          bun x nx run cv:docker --tags="ghcr.io/philip-lehmann/cv:latest,ghcr.io/philip-lehmann/cv:${{ env.TAG_VERSION }}"

      - name: git pull
        if: github.ref == 'refs/heads/main'
        run: |
          git pull --rebase --autostash
      - uses: philiplehmann/setup-kustomize@v2.2.5
        if: github.ref == 'refs/heads/main'
      - name: set image tag
        if: github.ref == 'refs/heads/main'
        run: |
          cd kustomize/cv
          kustomize edit set image ghcr.io/philip-lehmann/cv=ghcr.io/philip-lehmann/cv:${{ env.TAG_VERSION }}
      - name: Commit & Push changes
        if: github.ref == 'refs/heads/main'
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: Set image tag to `${{ env.TAG_VERSION }}`

  sonar:
    name: sonar check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: SonarSource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
