apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cv-philiplehmann
spec:
  parentRefs:
  - name: istio
    namespace: istio-system
  hostnames:
  - cv.philiplehmann.ch
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: cv-philiplehmann
      port: 3000


---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: philiplehmann
spec:
  parentRefs:
  - name: istio
    namespace: istio-system
  hostnames:
  - philiplehmann.ch
  - www.philiplehmann.ch
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: cv-philiplehmann
      port: 3000
